name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: youssefjlassi
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v4
        with:
          context: ./springboot/app
          push: true
          tags: youssefjlassi/spring-app:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v4
        with:
          context: ./angular-app
          push: true
          tags: youssefjlassi/angular-app:latest

      - name: Test with Docker Compose
        run: |
          docker compose up -d
          sleep 20
          docker-compose ps
